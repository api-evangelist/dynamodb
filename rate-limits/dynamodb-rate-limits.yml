specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Amazon DynamoDB
providerId: dynamodb
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - AWS
  - Database
  - NoSQL
description: DynamoDB throttling is governed by per-table and per-account capacity quotas (RCU/WCU or
  request units), not a flat per-second API rate. Quotas apply per AWS Region and are adjustable via
  AWS Service Quotas. Throttled requests return ProvisionedThroughputExceededException or RequestLimitExceeded.
sources:
  - https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/Limits.html
  - https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/ServiceQuotas.html
responseCodes:
  throttled: 400
  quotaExceeded: 400
  serviceUnavailable: 503
limits:
  - name: Per-table read throughput (provisioned)
    scope: account/region/table
    metric: read_capacity_units
    limit: 40000
    timeFrame: second
    notes: Default per-table provisioned RCU; adjustable via AWS Service Quotas.
  - name: Per-table write throughput (provisioned)
    scope: account/region/table
    metric: write_capacity_units
    limit: 40000
    timeFrame: second
    notes: Default per-table provisioned WCU; adjustable via AWS Service Quotas.
  - name: Per-account read throughput (provisioned)
    scope: account/region
    metric: read_capacity_units
    limit: 80000
    timeFrame: second
    notes: Sum across all tables and GSIs in a Region; adjustable.
  - name: Per-account write throughput (provisioned)
    scope: account/region
    metric: write_capacity_units
    limit: 80000
    timeFrame: second
    notes: Sum across all tables and GSIs in a Region; adjustable.
  - name: Per-table on-demand read throughput
    scope: account/region/table
    metric: read_request_units
    limit: 40000
    timeFrame: second
    notes: Initial default for on-demand tables; auto-scales further with traffic.
  - name: Per-table on-demand write throughput
    scope: account/region/table
    metric: write_request_units
    limit: 40000
    timeFrame: second
    notes: Initial default for on-demand tables; auto-scales further with traffic.
  - name: Tables per account per Region
    scope: account/region
    metric: tables
    limit: 2500
    timeFrame: usage
    notes: Initial default; can be increased to 10,000 via AWS Support.
  - name: Global secondary indexes per table
    scope: table
    metric: indexes
    limit: 20
  - name: Local secondary indexes per table
    scope: table
    metric: indexes
    limit: 5
  - name: Provisioned-throughput decreases per table per day
    scope: account/region/table
    metric: operations
    limit: 27
    timeFrame: day
    notes: 4 in first hour plus 1 per hour, capped at 4 available at any time.
  - name: Concurrent restores
    scope: account
    metric: concurrent_operations
    limit: 50
    timeFrame: usage
    notes: Up to 50 TB total across in-flight restores.
policies:
  - name: Adaptive capacity
    description: DynamoDB redistributes throughput across hot partitions automatically; hot keys can still
      throttle if they exceed partition-level limits (~3,000 RCU / 1,000 WCU per partition).
  - name: Backoff and retry
    description: AWS SDKs retry throttled requests with exponential backoff and jitter; honor RequestLimitExceeded
      and ProvisionedThroughputExceededException by reducing rate.
  - name: Service Quotas
    description: Increase per-table and per-account read/write throughput, table count, and concurrent
      operations by requesting limit increases through the AWS Service Quotas console or AWS Support.
  - name: On-demand auto-scaling
    description: On-demand tables double previous peak capacity within 30 minutes; sustained step changes
      may briefly throttle until DynamoDB scales.
  - name: Burst capacity
    description: Provisioned tables retain up to 5 minutes of unused capacity for burst traffic; use sparingly
      as it is not guaranteed.
maintainers:
