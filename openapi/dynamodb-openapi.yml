      description: >-
        Lists all tags on an Amazon DynamoDB resource. You can call
        ListTagsOfResource up to 10 times per second, per account.
      tags:
        - Tags
      parameters:
        - $ref: '#/components/parameters/X-Amz-Target-ListTagsOfResource'
      requestBody:
