  schemas:
    AttributeValue:
      type: object
      description: >-
        Represents the data for an attribute. Each attribute value is described
        as a name-value pair. The name is the data type, and the value is the
        data itself. DynamoDB supports scalar types (String, Number, Binary,
        Boolean, Null), document types (List, Map), and set types (String Set,
        Number Set, Binary Set).
      properties:
        S:
          type: string
          description: An attribute of type String
          example: example_value
        N:
          type: string
          description: An attribute of type Number (sent as a string to preserve precision)
          example: example_value
        B:
          type: string
          format: byte
          description: An attribute of type Binary (Base64-encoded)
          example: example_value
        SS:
          type: array
          items:
            type: string
          description: An attribute of type String Set
          example: []
        NS:
          type: array
          items:
            type: string
          description: An attribute of type Number Set
          example: []
        BS:
          type: array
          items:
            type: string
            format: byte
          description: An attribute of type Binary Set
          example: []
        M:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
          description: An attribute of type Map
          example: example_value
        L:
          type: array
          items:
            $ref: '#/components/schemas/AttributeValue'
          description: An attribute of type List
          example: []
        'NULL':
          type: boolean
          description: An attribute of type Null
          example: true
        BOOL:
          type: boolean
          description: An attribute of type Boolean

          example: true
    AttributeDefinition:
      type: object
      required:
      - AttributeName
      - AttributeType
      properties:
        AttributeName:
          type: string
          description: A name for the attribute
          minLength: 1
          maxLength: 255
          example: example_value
        AttributeType:
          type: string
          enum:
          - S
          - N
          - B
          description: 'The data type for the attribute: S (String), N (Number), B (Binary)'

          example: S
    KeySchemaElement:
      type: object
      required:
      - AttributeName
      - KeyType
      properties:
        AttributeName:
          type: string
          description: The name of a key attribute
          minLength: 1
          maxLength: 255
          example: example_value
        KeyType:
          type: string
          enum:
          - HASH
          - RANGE
          description: 'The role of the key attribute: HASH (partition key) or RANGE (sort key)'

          example: HASH
    ProvisionedThroughput:
      type: object
      required:
      - ReadCapacityUnits
      - WriteCapacityUnits
      properties:
        ReadCapacityUnits:
          type: integer
          minimum: 1
          description: >-
            The maximum number of strongly consistent reads consumed per second
          example: 10
        WriteCapacityUnits:
          type: integer
          minimum: 1
          description: >-
            The maximum number of writes consumed per second

          example: 10
    ProvisionedThroughputDescription:
      type: object
      properties:
        LastIncreaseDateTime:
          type: string
          format: date-time
          description: The date and time of the last provisioned throughput increase
          example: '2026-01-15T10:30:00Z'
        LastDecreaseDateTime:
          type: string
          format: date-time
          description: The date and time of the last provisioned throughput decrease
          example: '2026-01-15T10:30:00Z'
        NumberOfDecreasesToday:
          type: integer
          description: The number of provisioned throughput decreases for this table during this UTC calendar day
          example: 10
        ReadCapacityUnits:
          type: integer
          description: The maximum number of strongly consistent reads consumed per second
          example: 10
        WriteCapacityUnits:
          type: integer
          description: The maximum number of writes consumed per second

          example: 10
    GlobalSecondaryIndex:
      type: object
      required:
      - IndexName
      - KeySchema
      - Projection
      properties:
        IndexName:
          type: string
          minLength: 3
          maxLength: 255
          description: The name of the global secondary index
          example: example_value
        KeySchema:
          type: array
          items:
            $ref: '#/components/schemas/KeySchemaElement'
          minItems: 1
          maxItems: 2
          description: The key schema for the global secondary index
          example: []
        Projection:
          $ref: '#/components/schemas/Projection'
        ProvisionedThroughput:
          $ref: '#/components/schemas/ProvisionedThroughput'

    LocalSecondaryIndex:
      type: object
      required:
      - IndexName
      - KeySchema
      - Projection
      properties:
        IndexName:
          type: string
          minLength: 3
          maxLength: 255
          description: The name of the local secondary index
          example: example_value
        KeySchema:
          type: array
          items:
            $ref: '#/components/schemas/KeySchemaElement'
          minItems: 2
          maxItems: 2
          description: The key schema for the local secondary index
          example: []
        Projection:
          $ref: '#/components/schemas/Projection'

    Projection:
      type: object
      properties:
        ProjectionType:
          type: string
          enum:
          - ALL
          - KEYS_ONLY
          - INCLUDE
          description: The set of attributes that are projected into the index
          example: ALL
        NonKeyAttributes:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 20
          description: List of non-key attribute names that are projected into the index

          example: []
    StreamSpecification:
      type: object
      required:
      - StreamEnabled
      properties:
        StreamEnabled:
          type: boolean
          description: Indicates whether DynamoDB Streams is enabled on the table
          example: true
        StreamViewType:
          type: string
          enum:
          - NEW_IMAGE
          - OLD_IMAGE
          - NEW_AND_OLD_IMAGES
          - KEYS_ONLY
          description: Determines the information written to the stream for this table

          example: NEW_IMAGE
    SSESpecification:
      type: object
      properties:
        Enabled:
          type: boolean
          description: Indicates whether server-side encryption is enabled
          example: true
        SSEType:
          type: string
          enum:
          - AES256
          - KMS
          description: Server-side encryption type
          example: AES256
        KMSMasterKeyId:
          type: string
          description: The KMS key that should be used for server-side encryption

          example: '500123'
    Tag:
      type: object
      required:
      - Key
      - Value
      properties:
        Key:
          type: string
          minLength: 1
          maxLength: 128
          description: The key of the tag
          example: example_value
        Value:
          type: string
          minLength: 0
          maxLength: 256
          description: The value of the tag

          example: example_value
    TableDescription:
      type: object
      properties:
        TableName:
          type: string
          description: The name of the table
          example: example_value
        TableStatus:
          type: string
          enum:
          - CREATING
          - UPDATING
          - DELETING
          - ACTIVE
          - INACCESSIBLE_ENCRYPTION_CREDENTIALS
          - ARCHIVING
          - ARCHIVED
          description: The current state of the table
          example: CREATING
