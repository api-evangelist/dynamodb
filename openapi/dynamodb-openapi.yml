              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#ListBackups:
    post:
      operationId: ListBackups
      summary: List on-demand backups
      description: >-
        Lists completed and pending backups for a DynamoDB table. The backups
        are returned in reverse chronological order by creation time.
      tags:
        - Backups
      parameters:
