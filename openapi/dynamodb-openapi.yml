  /#ExportTableToPointInTime:
    post:
      operationId: ExportTableToPointInTime
      summary: Export table data to S3
      description: >-
        Exports table data to an S3 bucket. The table must have point in time
        recovery enabled. You can export data in DynamoDB JSON or Amazon Ion
        format.
      tags:
