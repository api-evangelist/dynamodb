  schemas:
    AttributeValue:
      type: object
      description: >-
        Represents the data for an attribute. Each attribute value is described
        as a name-value pair. The name is the data type, and the value is the
        data itself. DynamoDB supports scalar types (String, Number, Binary,
        Boolean, Null), document types (List, Map), and set types (String Set,
        Number Set, Binary Set).
      properties:
        S:
          type: string
          description: An attribute of type String
        N:
          type: string
          description: An attribute of type Number (sent as a string to preserve precision)
        B:
          type: string
          format: byte
          description: An attribute of type Binary (Base64-encoded)
        SS:
          type: array
          items:
            type: string
          description: An attribute of type String Set
        NS:
          type: array
          items:
            type: string
          description: An attribute of type Number Set
        BS:
          type: array
          items:
            type: string
            format: byte
          description: An attribute of type Binary Set
        M:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
          description: An attribute of type Map
        L:
          type: array
          items:
            $ref: '#/components/schemas/AttributeValue'
          description: An attribute of type List
        'NULL':
          type: boolean
          description: An attribute of type Null
        BOOL:
          type: boolean
          description: An attribute of type Boolean

    AttributeDefinition:
      type: object
      required:
        - AttributeName
        - AttributeType
      properties:
        AttributeName:
          type: string
          description: A name for the attribute
          minLength: 1
          maxLength: 255
        AttributeType:
          type: string
          enum:
            - S
            - N
            - B
          description: 'The data type for the attribute: S (String), N (Number), B (Binary)'

    KeySchemaElement:
      type: object
      required:
        - AttributeName
        - KeyType
      properties:
        AttributeName:
          type: string
          description: The name of a key attribute
          minLength: 1
          maxLength: 255
        KeyType:
          type: string
          enum:
            - HASH
            - RANGE
          description: 'The role of the key attribute: HASH (partition key) or RANGE (sort key)'

    ProvisionedThroughput:
      type: object
      required:
        - ReadCapacityUnits
        - WriteCapacityUnits
      properties:
        ReadCapacityUnits:
          type: integer
          minimum: 1
          description: >-
            The maximum number of strongly consistent reads consumed per second
        WriteCapacityUnits:
          type: integer
          minimum: 1
          description: >-
            The maximum number of writes consumed per second

    ProvisionedThroughputDescription:
      type: object
      properties:
        LastIncreaseDateTime:
          type: string
          format: date-time
          description: The date and time of the last provisioned throughput increase
        LastDecreaseDateTime:
          type: string
          format: date-time
          description: The date and time of the last provisioned throughput decrease
        NumberOfDecreasesToday:
          type: integer
          description: The number of provisioned throughput decreases for this table during this UTC calendar day
        ReadCapacityUnits:
          type: integer
          description: The maximum number of strongly consistent reads consumed per second
        WriteCapacityUnits:
          type: integer
          description: The maximum number of writes consumed per second

    GlobalSecondaryIndex:
      type: object
      required:
        - IndexName
        - KeySchema
        - Projection
      properties:
        IndexName:
          type: string
          minLength: 3
          maxLength: 255
          description: The name of the global secondary index
        KeySchema:
          type: array
          items:
            $ref: '#/components/schemas/KeySchemaElement'
          minItems: 1
          maxItems: 2
          description: The key schema for the global secondary index
        Projection:
          $ref: '#/components/schemas/Projection'
        ProvisionedThroughput:
          $ref: '#/components/schemas/ProvisionedThroughput'

    LocalSecondaryIndex:
      type: object
      required:
        - IndexName
        - KeySchema
        - Projection
      properties:
        IndexName:
          type: string
          minLength: 3
          maxLength: 255
          description: The name of the local secondary index
        KeySchema:
          type: array
          items:
            $ref: '#/components/schemas/KeySchemaElement'
          minItems: 2
          maxItems: 2
          description: The key schema for the local secondary index
        Projection:
          $ref: '#/components/schemas/Projection'

    Projection:
      type: object
      properties:
        ProjectionType:
          type: string
          enum:
            - ALL
            - KEYS_ONLY
            - INCLUDE
          description: The set of attributes that are projected into the index
        NonKeyAttributes:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 20
          description: List of non-key attribute names that are projected into the index

    StreamSpecification:
      type: object
      required:
        - StreamEnabled
      properties:
        StreamEnabled:
          type: boolean
          description: Indicates whether DynamoDB Streams is enabled on the table
        StreamViewType:
          type: string
          enum:
            - NEW_IMAGE
            - OLD_IMAGE
            - NEW_AND_OLD_IMAGES
            - KEYS_ONLY
          description: Determines the information written to the stream for this table

    SSESpecification:
      type: object
      properties:
        Enabled:
          type: boolean
          description: Indicates whether server-side encryption is enabled
        SSEType:
          type: string
          enum:
            - AES256
            - KMS
          description: Server-side encryption type
        KMSMasterKeyId:
          type: string
          description: The KMS key that should be used for server-side encryption

    Tag:
      type: object
      required:
        - Key
        - Value
      properties:
        Key:
          type: string
          minLength: 1
          maxLength: 128
          description: The key of the tag
        Value:
          type: string
          minLength: 0
          maxLength: 256
          description: The value of the tag

    TableDescription:
      type: object
      properties:
        TableName:
          type: string
          description: The name of the table
        TableStatus:
          type: string
          enum:
            - CREATING
            - UPDATING
            - DELETING
            - ACTIVE
            - INACCESSIBLE_ENCRYPTION_CREDENTIALS
            - ARCHIVING
            - ARCHIVED
          description: The current state of the table
        TableArn:
          type: string
          description: The Amazon Resource Name (ARN) of the table
        TableId:
          type: string
          description: Unique identifier for the table
        TableSizeBytes:
          type: integer
          description: The total size of the specified table in bytes
        ItemCount:
          type: integer
          description: The number of items in the specified table
        CreationDateTime:
          type: string
          format: date-time
          description: The date and time when the table was created
        AttributeDefinitions:
          type: array
          items:
            $ref: '#/components/schemas/AttributeDefinition'
          description: An array of AttributeDefinition objects
        KeySchema:
          type: array
          items:
            $ref: '#/components/schemas/KeySchemaElement'
          description: The primary key structure for the table
        ProvisionedThroughput:
          $ref: '#/components/schemas/ProvisionedThroughputDescription'
        BillingModeSummary:
          type: object
          properties:
            BillingMode:
              type: string
              enum:
                - PROVISIONED
                - PAY_PER_REQUEST
            LastUpdateToPayPerRequestDateTime:
              type: string
              format: date-time
        GlobalSecondaryIndexes:
          type: array
          items:
            type: object
            properties:
              IndexName:
                type: string
              IndexStatus:
                type: string
                enum:
                  - CREATING
                  - UPDATING
                  - DELETING
                  - ACTIVE
              KeySchema:
                type: array
                items:
                  $ref: '#/components/schemas/KeySchemaElement'
              Projection:
                $ref: '#/components/schemas/Projection'
              IndexSizeBytes:
                type: integer
              ItemCount:
                type: integer
              IndexArn:
                type: string
              ProvisionedThroughput:
                $ref: '#/components/schemas/ProvisionedThroughputDescription'
        LocalSecondaryIndexes:
          type: array
          items:
            type: object
            properties:
              IndexName:
                type: string
              KeySchema:
                type: array
                items:
                  $ref: '#/components/schemas/KeySchemaElement'
              Projection:
                $ref: '#/components/schemas/Projection'
              IndexSizeBytes:
                type: integer
              ItemCount:
                type: integer
              IndexArn:
                type: string
        StreamSpecification:
          $ref: '#/components/schemas/StreamSpecification'
        LatestStreamLabel:
          type: string
          description: A timestamp in ISO 8601 format of the stream label
        LatestStreamArn:
          type: string
          description: The ARN of the latest DynamoDB stream
        DeletionProtectionEnabled:
          type: boolean
          description: Indicates whether deletion protection is enabled
        TableClassSummary:
          type: object
          properties:
            TableClass:
              type: string
              enum:
                - STANDARD
                - STANDARD_INFREQUENT_ACCESS
            LastUpdateDateTime:
              type: string
              format: date-time
        SSEDescription:
          type: object
          properties:
            Status:
              type: string
              enum:
                - ENABLING
                - ENABLED
                - DISABLING
                - DISABLED
                - UPDATING
            SSEType:
              type: string
              enum:
                - AES256
                - KMS
            KMSMasterKeyArn:
              type: string

    CreateTableInput:
      type: object
      required:
        - TableName
        - KeySchema
        - AttributeDefinitions
      properties:
        TableName:
          type: string
          minLength: 3
          maxLength: 255
          pattern: '[a-zA-Z0-9_.-]+'
          description: >-
            The name of the table to create. Must be between 3 and 255
            characters long.
        AttributeDefinitions:
          type: array
          items:
            $ref: '#/components/schemas/AttributeDefinition'
          description: >-
            An array of attributes that describe the key schema for the table
            and indexes
        KeySchema:
          type: array
          items:
            $ref: '#/components/schemas/KeySchemaElement'
          minItems: 1
          maxItems: 2
          description: >-
            Specifies the attributes that make up the primary key for a table
            or an index
        BillingMode:
          type: string
          enum:
            - PROVISIONED
            - PAY_PER_REQUEST
          description: Controls how you are charged for read and write throughput
        ProvisionedThroughput:
          $ref: '#/components/schemas/ProvisionedThroughput'
        GlobalSecondaryIndexes:
          type: array
          items:
            $ref: '#/components/schemas/GlobalSecondaryIndex'
          description: One or more global secondary indexes to create on the table
        LocalSecondaryIndexes:
          type: array
          items:
            $ref: '#/components/schemas/LocalSecondaryIndex'
          description: One or more local secondary indexes to create on the table
        StreamSpecification:
          $ref: '#/components/schemas/StreamSpecification'
        SSESpecification:
          $ref: '#/components/schemas/SSESpecification'
        Tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          description: Tags to associate with the table
        TableClass:
          type: string
          enum:
            - STANDARD
            - STANDARD_INFREQUENT_ACCESS
          description: The table class of the new table
        DeletionProtectionEnabled:
          type: boolean
          description: Indicates whether deletion protection is enabled

    CreateTableOutput:
      type: object
      properties:
        TableDescription:
          $ref: '#/components/schemas/TableDescription'

    DescribeTableInput:
      type: object
      required:
        - TableName
      properties:
        TableName:
          type: string
          minLength: 3
          maxLength: 255
          description: The name of the table to describe

    DescribeTableOutput:
      type: object
      properties:
        Table:
          $ref: '#/components/schemas/TableDescription'

    UpdateTableInput:
      type: object
      required:
        - TableName
      properties:
        TableName:
          type: string
          minLength: 3
          maxLength: 255
          description: The name of the table to update
        AttributeDefinitions:
          type: array
          items:
            $ref: '#/components/schemas/AttributeDefinition'
        BillingMode:
          type: string
          enum:
            - PROVISIONED
            - PAY_PER_REQUEST
        ProvisionedThroughput:
          $ref: '#/components/schemas/ProvisionedThroughput'
        GlobalSecondaryIndexUpdates:
          type: array
          items:
            type: object
            properties:
              Update:
                type: object
                properties:
                  IndexName:
                    type: string
                  ProvisionedThroughput:
                    $ref: '#/components/schemas/ProvisionedThroughput'
              Create:
                $ref: '#/components/schemas/GlobalSecondaryIndex'
              Delete:
                type: object
                properties:
                  IndexName:
                    type: string
        StreamSpecification:
          $ref: '#/components/schemas/StreamSpecification'
        SSESpecification:
          $ref: '#/components/schemas/SSESpecification'
        TableClass:
          type: string
          enum:
            - STANDARD
            - STANDARD_INFREQUENT_ACCESS
        DeletionProtectionEnabled:
          type: boolean

    UpdateTableOutput:
      type: object
      properties:
        TableDescription:
          $ref: '#/components/schemas/TableDescription'

    DeleteTableInput:
      type: object
      required:
        - TableName
      properties:
        TableName:
          type: string
          minLength: 3
          maxLength: 255
          description: The name of the table to delete

    DeleteTableOutput:
      type: object
      properties:
        TableDescription:
          $ref: '#/components/schemas/TableDescription'

    ListTablesInput:
      type: object
      properties:
        ExclusiveStartTableName:
          type: string
          minLength: 3
          maxLength: 255
          description: >-
            The first table name that this operation will evaluate. Use the
            value returned for LastEvaluatedTableName in a previous operation.
        Limit:
          type: integer
          minimum: 1
          maximum: 100
          description: Maximum number of table names to return (1-100)

    ListTablesOutput:
      type: object
      properties:
        TableNames:
          type: array
          items:
            type: string
          description: The names of the tables associated with the current account
        LastEvaluatedTableName:
          type: string
          description: >-
            The name of the last table in the current page of results. Use this
            value as ExclusiveStartTableName for the next request.

    PutItemInput:
      type: object
      required:
        - TableName
        - Item
      properties:
        TableName:
          type: string
          minLength: 3
          maxLength: 255
          description: The name of the table to contain the item
        Item:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
          description: >-
            A map of attribute name/value pairs, one for each attribute. Only
            the primary key attributes are required, but you can optionally
            provide other attribute name-value pairs.
        ConditionExpression:
          type: string
          description: >-
            A condition that must be satisfied in order for a conditional
            PutItem operation to succeed
        ExpressionAttributeNames:
          type: object
          additionalProperties:
            type: string
          description: One or more substitution tokens for attribute names in an expression
        ExpressionAttributeValues:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
          description: One or more values that can be substituted in an expression
        ReturnValues:
          type: string
          enum:
            - NONE
            - ALL_OLD
          description: Whether to return the item attributes as they appeared before the PutItem
        ReturnConsumedCapacity:
          type: string
          enum:
            - INDEXES
            - TOTAL
            - NONE
          description: Determines the level of detail about provisioned throughput consumption
        ReturnItemCollectionMetrics:
          type: string
          enum:
            - SIZE
            - NONE
          description: Determines whether item collection metrics are returned

    PutItemOutput:
      type: object
      properties:
        Attributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
          description: The attribute values as they appeared before the PutItem operation
        ConsumedCapacity:
          $ref: '#/components/schemas/ConsumedCapacity'
        ItemCollectionMetrics:
          $ref: '#/components/schemas/ItemCollectionMetrics'

    GetItemInput:
      type: object
      required:
        - TableName
        - Key
      properties:
        TableName:
          type: string
          minLength: 3
          maxLength: 255
          description: The name of the table containing the requested item
        Key:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
          description: >-
            A map of attribute names to AttributeValue objects, representing
            the primary key of the item to retrieve
        ProjectionExpression:
          type: string
          description: A string that identifies one or more attributes to retrieve from the table
        ExpressionAttributeNames:
          type: object
          additionalProperties:
            type: string
          description: One or more substitution tokens for attribute names in an expression
        ConsistentRead:
          type: boolean
          description: >-
            If set to true, the operation uses strongly consistent reads;
            otherwise, eventually consistent reads are used
        ReturnConsumedCapacity:
          type: string
          enum:
            - INDEXES
            - TOTAL
            - NONE

    GetItemOutput:
      type: object
      properties:
        Item:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
          description: >-
            A map of attribute names to AttributeValue objects. Only returned
            if the item with the given primary key exists.
        ConsumedCapacity:
          $ref: '#/components/schemas/ConsumedCapacity'

    UpdateItemInput:
      type: object
      required:
        - TableName
        - Key
      properties:
        TableName:
          type: string
          minLength: 3
          maxLength: 255
          description: The name of the table containing the item to update
        Key:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
          description: The primary key of the item to update
        UpdateExpression:
          type: string
          description: >-
            An expression that defines one or more attributes to be updated,
            the action to be performed on them, and new values for them
        ConditionExpression:
          type: string
          description: A condition that must be satisfied for the update to succeed
        ExpressionAttributeNames:
          type: object
          additionalProperties:
            type: string
        ExpressionAttributeValues:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
        ReturnValues:
          type: string
          enum:
            - NONE
            - UPDATED_OLD
            - UPDATED_NEW
            - ALL_OLD
            - ALL_NEW
          description: Whether to return the item attributes as they appeared before or after the update
        ReturnConsumedCapacity:
          type: string
          enum:
            - INDEXES
            - TOTAL
            - NONE
        ReturnItemCollectionMetrics:
          type: string
          enum:
            - SIZE
            - NONE

    UpdateItemOutput:
      type: object
      properties:
        Attributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
          description: The attribute values as they appeared before or after the update
        ConsumedCapacity:
          $ref: '#/components/schemas/ConsumedCapacity'
        ItemCollectionMetrics:
          $ref: '#/components/schemas/ItemCollectionMetrics'

    DeleteItemInput:
      type: object
      required:
        - TableName
        - Key
      properties:
        TableName:
          type: string
          minLength: 3
          maxLength: 255
          description: The name of the table from which to delete the item
        Key:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
          description: The primary key of the item to delete
        ConditionExpression:
          type: string
          description: A condition that must be satisfied for the deletion to succeed
        ExpressionAttributeNames:
          type: object
          additionalProperties:
            type: string
        ExpressionAttributeValues:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
        ReturnValues:
          type: string
          enum:
            - NONE
            - ALL_OLD
          description: Whether to return the item attributes as they appeared before deletion
        ReturnConsumedCapacity:
          type: string
          enum:
            - INDEXES
            - TOTAL
            - NONE

    DeleteItemOutput:
