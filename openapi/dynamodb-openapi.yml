          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
          description: The attribute values as they appeared before the item was deleted
        ConsumedCapacity:
          $ref: '#/components/schemas/ConsumedCapacity'
        ItemCollectionMetrics:
          $ref: '#/components/schemas/ItemCollectionMetrics'

    QueryInput:
      type: object
      required:
        - TableName
      properties:
        TableName:
          type: string
          minLength: 3
          maxLength: 255
          description: The name of the table containing the requested items
        IndexName:
          type: string
          minLength: 3
          maxLength: 255
          description: The name of a secondary index to query
        KeyConditionExpression:
          type: string
          description: >-
            The condition that specifies the key values for items to be
            retrieved by the Query action. Must specify the partition key name
            and value as an equality condition.
        FilterExpression:
          type: string
          description: >-
            A string that contains conditions that DynamoDB applies after the
            Query operation, but before the data is returned
        ProjectionExpression:
          type: string
          description: A string that identifies attributes to retrieve from the table
        ExpressionAttributeNames:
          type: object
          additionalProperties:
            type: string
        ExpressionAttributeValues:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
        Select:
          type: string
          enum:
            - ALL_ATTRIBUTES
            - ALL_PROJECTED_ATTRIBUTES
            - SPECIFIC_ATTRIBUTES
            - COUNT
          description: The attributes to be returned in the result
        ScanIndexForward:
          type: boolean
          description: >-
            If true (default), the traversal is performed in ascending order;
            if false, in descending order
        Limit:
          type: integer
          minimum: 1
          description: The maximum number of items to evaluate
        ConsistentRead:
          type: boolean
          description: Whether to use strongly consistent reads
        ExclusiveStartKey:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
          description: The primary key of the first item for this query to evaluate
        ReturnConsumedCapacity:
          type: string
          enum:
            - INDEXES
            - TOTAL
            - NONE

    QueryOutput:
      type: object
      properties:
        Items:
          type: array
          items:
            type: object
            additionalProperties:
              $ref: '#/components/schemas/AttributeValue'
          description: An array of item attributes that match the query criteria
        Count:
          type: integer
          description: The number of items in the response
        ScannedCount:
          type: integer
          description: The number of items evaluated before any filter was applied
        LastEvaluatedKey:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeValue'
          description: >-
            The primary key of the item where the operation stopped, inclusive
            of the previous result set. Use this value for ExclusiveStartKey
            in a new request to continue the query.
        ConsumedCapacity:
          $ref: '#/components/schemas/ConsumedCapacity'

    ScanInput:
      type: object
