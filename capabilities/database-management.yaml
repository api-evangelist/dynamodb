naftiko: 1.0.0-alpha2
info:
  label: Amazon DynamoDB Database Management
  description: Unified workflow for managing DynamoDB tables, items, queries, batch operations, transactions, and backups.
    Used by backend developers and data engineers.
  tags:
  - AWS
  - DynamoDB
  - NoSQL
  - Database Management
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
  - type: http
    namespace: dynamodb
    baseUri: https://dynamodb.us-east-1.amazonaws.com
    description: Amazon DynamoDB API for NoSQL database operations.
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4}}'
      placement: header
    resources:
    - name: tables
      path: /
      description: Table management operations.
      operations:
      - name: create-table
        method: POST
        description: Create a new DynamoDB table.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            TableName: '{{tools.tableName}}'
      - name: describe-table
        method: POST
        description: Describe a DynamoDB table.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            TableName: '{{tools.tableName}}'
      - name: list-tables
        method: POST
        description: List DynamoDB tables.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-table
        method: POST
        description: Update a DynamoDB table.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            TableName: '{{tools.tableName}}'
      - name: delete-table
        method: POST
        description: Delete a DynamoDB table.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            TableName: '{{tools.tableName}}'
    - name: items
      path: /
      description: Item-level operations.
      operations:
      - name: put-item
        method: POST
        description: Create or replace an item.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            TableName: '{{tools.tableName}}'
            Item: '{{tools.item}}'
      - name: get-item
        method: POST
        description: Get an item by primary key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            TableName: '{{tools.tableName}}'
            Key: '{{tools.key}}'
      - name: update-item
        method: POST
        description: Update an item.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            TableName: '{{tools.tableName}}'
            Key: '{{tools.key}}'
      - name: delete-item
        method: POST
        description: Delete an item.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            TableName: '{{tools.tableName}}'
            Key: '{{tools.key}}'
    - name: queries
      path: /
      description: Query and scan operations.
      operations:
      - name: query
        method: POST
        description: Query items by primary key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            TableName: '{{tools.tableName}}'
      - name: scan
        method: POST
        description: Scan an entire table or index.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            TableName: '{{tools.tableName}}'
    - name: batch-operations
      path: /
      description: Batch read and write operations.
      operations:
      - name: batch-get-item
        method: POST
        description: Get multiple items from one or more tables.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            RequestItems: '{{tools.requestItems}}'
      - name: batch-write-item
        method: POST
        description: Put or delete multiple items.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            RequestItems: '{{tools.requestItems}}'
    - name: transactions
      path: /
      description: Transactional operations.
      operations:
      - name: transact-get-items
        method: POST
        description: Get items in a transaction.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: transact-write-items
        method: POST
        description: Write items in a transaction.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: backups
      path: /
      description: Backup operations.
      operations:
      - name: create-backup
        method: POST
        description: Create an on-demand backup.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            TableName: '{{tools.tableName}}'
            BackupName: '{{tools.backupName}}'
      - name: list-backups
        method: POST
        description: List on-demand backups.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: dynamodb-management-api
    description: Unified REST API for DynamoDB database management.
    resources:
    - path: /v1/tables
      name: tables
      description: Table management.
      operations:
      - method: GET
        name: list-tables
        description: List tables.
        call: dynamodb.list-tables
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-table
        description: Create a table.
        call: dynamodb.create-table
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tables/{id}
      name: table-details
      description: Individual table management.
      operations:
      - method: GET
        name: describe-table
        description: Describe a table.
        call: dynamodb.describe-table
        with:
          tableName: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-table
        description: Update a table.
        call: dynamodb.update-table
        with:
          tableName: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-table
        description: Delete a table.
        call: dynamodb.delete-table
        with:
          tableName: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/items
      name: items
      description: Item operations.
      operations:
      - method: POST
        name: put-item
        description: Create or replace an item.
        call: dynamodb.put-item
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: get-item
        description: Get an item.
        call: dynamodb.get-item
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/queries
      name: queries
      description: Query operations.
      operations:
      - method: POST
        name: query
        description: Query items.
        call: dynamodb.query
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: scan
        description: Scan a table.
        call: dynamodb.scan
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: dynamodb-management-mcp
    transport: http
    description: MCP server for AI-assisted DynamoDB database management.
    tools:
    - name: list-tables
      description: List DynamoDB tables.
      hints:
        readOnly: true
        openWorld: true
      call: dynamodb.list-tables
      outputParameters:
      - type: object
        mapping: $.
    - name: describe-table
      description: Describe a DynamoDB table.
      hints:
        readOnly: true
      call: dynamodb.describe-table
      with:
        tableName: tools.tableName
      outputParameters:
      - type: object
        mapping: $.
    - name: create-table
      description: Create a new DynamoDB table.
      hints:
        readOnly: false
      call: dynamodb.create-table
      with:
        tableName: tools.tableName
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-table
      description: Delete a DynamoDB table.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: dynamodb.delete-table
      with:
        tableName: tools.tableName
      outputParameters:
      - type: object
        mapping: $.
    - name: put-item
      description: Create or replace an item.
      hints:
        readOnly: false
        idempotent: true
      call: dynamodb.put-item
      with:
        tableName: tools.tableName
      outputParameters:
      - type: object
        mapping: $.
    - name: get-item
      description: Get an item by primary key.
      hints:
        readOnly: true
      call: dynamodb.get-item
      with:
        tableName: tools.tableName
      outputParameters:
      - type: object
        mapping: $.
    - name: update-item
      description: Update an item.
      hints:
        readOnly: false
        idempotent: true
      call: dynamodb.update-item
      with:
        tableName: tools.tableName
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-item
      description: Delete an item.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: dynamodb.delete-item
      with:
        tableName: tools.tableName
      outputParameters:
      - type: object
        mapping: $.
    - name: query
      description: Query items by primary key.
      hints:
        readOnly: true
      call: dynamodb.query
      with:
        tableName: tools.tableName
      outputParameters:
      - type: object
        mapping: $.
    - name: scan
      description: Scan an entire table or index.
      hints:
        readOnly: true
        openWorld: true
      call: dynamodb.scan
      with:
        tableName: tools.tableName
      outputParameters:
      - type: object
        mapping: $.
    - name: batch-get-item
      description: Get multiple items from one or more tables.
      hints:
        readOnly: true
      call: dynamodb.batch-get-item
      outputParameters:
      - type: object
        mapping: $.
    - name: batch-write-item
      description: Put or delete multiple items in batch.
      hints:
        readOnly: false
      call: dynamodb.batch-write-item
      outputParameters:
      - type: object
        mapping: $.
    - name: transact-get-items
      description: Get items in a transaction.
      hints:
        readOnly: true
      call: dynamodb.transact-get-items
      outputParameters:
      - type: object
        mapping: $.
    - name: transact-write-items
      description: Write items in a transaction.
      hints:
        readOnly: false
      call: dynamodb.transact-write-items
      outputParameters:
      - type: object
        mapping: $.
    - name: create-backup
      description: Create an on-demand backup.
      hints:
        readOnly: false
      call: dynamodb.create-backup
      with:
        tableName: tools.tableName
        backupName: tools.backupName
      outputParameters:
      - type: object
        mapping: $.
    - name: list-backups
      description: List on-demand backups.
      hints:
        readOnly: true
        openWorld: true
      call: dynamodb.list-backups
      outputParameters:
      - type: object
        mapping: $.
