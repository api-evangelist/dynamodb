naftiko: 1.0.0-alpha2
info:
  label: Amazon DynamoDB API — Imports
  description: 'Amazon DynamoDB API — Imports. 1 operations. Lead operation: Amazon Dynamodb Import Data From S3 Into a Dynamodb
    Table. Self-contained Naftiko capability covering one Dynamodb business surface.'
  tags:
  - Dynamodb
  - Imports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DYNAMODB_API_KEY: DYNAMODB_API_KEY
capability:
  consumes:
  - type: http
    namespace: dynamodb-imports
    baseUri: https://dynamodb.{region}.amazonaws.com
    description: Amazon DynamoDB API — Imports business capability. Self-contained, no shared references.
    resources:
    - name: '#ImportTable'
      path: /#ImportTable
      operations:
      - name: importtable
        method: POST
        description: Amazon Dynamodb Import Data From S3 Into a Dynamodb Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.DYNAMODB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: dynamodb-imports-rest
    port: 8080
    description: REST adapter for Amazon DynamoDB API — Imports. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/importtable
      name: importtable
      description: 'REST surface for #ImportTable.'
      operations:
      - method: POST
        name: importtable
        description: Amazon Dynamodb Import Data From S3 Into a Dynamodb Table
        call: dynamodb-imports.importtable
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dynamodb-imports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon DynamoDB API — Imports. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-dynamodb-import-data-s3
      description: Amazon Dynamodb Import Data From S3 Into a Dynamodb Table
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dynamodb-imports.importtable
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
