naftiko: 1.0.0-alpha2
info:
  label: Amazon DynamoDB API
  description: 'Amazon DynamoDB API. 3 operations. Lead operation: Amazon Dynamodb List Tags for a Dynamodb Resource. Self-contained
    Naftiko capability covering one Dynamodb business surface.'
  tags:
  - Dynamodb
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DYNAMODB_API_KEY: DYNAMODB_API_KEY
capability:
  consumes:
  - type: http
    namespace: dynamodb-general
    baseUri: https://dynamodb.{region}.amazonaws.com
    description: Amazon DynamoDB API business capability. Self-contained, no shared references.
    resources:
    - name: '#ListTagsOfResource'
      path: /#ListTagsOfResource
      operations:
      - name: listtagsofresource
        method: POST
        description: Amazon Dynamodb List Tags for a Dynamodb Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: '#TagResource'
      path: /#TagResource
      operations:
      - name: tagresource
        method: POST
        description: Amazon Dynamodb Tag a Dynamodb Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: '#UntagResource'
      path: /#UntagResource
      operations:
      - name: untagresource
        method: POST
        description: Amazon Dynamodb Remove Tags From a Dynamodb Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.DYNAMODB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: dynamodb-general-rest
    port: 8080
    description: REST adapter for Amazon DynamoDB API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/listtagsofresource
      name: listtagsofresource
      description: 'REST surface for #ListTagsOfResource.'
      operations:
      - method: POST
        name: listtagsofresource
        description: Amazon Dynamodb List Tags for a Dynamodb Resource
        call: dynamodb-general.listtagsofresource
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tagresource
      name: tagresource
      description: 'REST surface for #TagResource.'
      operations:
      - method: POST
        name: tagresource
        description: Amazon Dynamodb Tag a Dynamodb Resource
        call: dynamodb-general.tagresource
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/untagresource
      name: untagresource
      description: 'REST surface for #UntagResource.'
      operations:
      - method: POST
        name: untagresource
        description: Amazon Dynamodb Remove Tags From a Dynamodb Resource
        call: dynamodb-general.untagresource
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dynamodb-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon DynamoDB API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-dynamodb-list-tags-dynamodb
      description: Amazon Dynamodb List Tags for a Dynamodb Resource
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: dynamodb-general.listtagsofresource
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-dynamodb-tag-dynamodb-resource
      description: Amazon Dynamodb Tag a Dynamodb Resource
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dynamodb-general.tagresource
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-dynamodb-remove-tags-dynamodb
      description: Amazon Dynamodb Remove Tags From a Dynamodb Resource
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dynamodb-general.untagresource
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
