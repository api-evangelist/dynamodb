naftiko: 1.0.0-alpha2
info:
  label: Amazon DynamoDB API — Items
  description: 'Amazon DynamoDB API — Items. 4 operations. Lead operation: Amazon Dynamodb Delete an Item. Self-contained
    Naftiko capability covering one Dynamodb business surface.'
  tags:
  - Dynamodb
  - Items
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DYNAMODB_API_KEY: DYNAMODB_API_KEY
capability:
  consumes:
  - type: http
    namespace: dynamodb-items
    baseUri: https://dynamodb.{region}.amazonaws.com
    description: Amazon DynamoDB API — Items business capability. Self-contained, no shared references.
    resources:
    - name: '#DeleteItem'
      path: /#DeleteItem
      operations:
      - name: deleteitem
        method: POST
        description: Amazon Dynamodb Delete an Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: '#GetItem'
      path: /#GetItem
      operations:
      - name: getitem
        method: POST
        description: Amazon Dynamodb Get an Item by Primary Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: '#PutItem'
      path: /#PutItem
      operations:
      - name: putitem
        method: POST
        description: Amazon Dynamodb Create or Replace an Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: '#UpdateItem'
      path: /#UpdateItem
      operations:
      - name: updateitem
        method: POST
        description: Amazon Dynamodb Update an Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.DYNAMODB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: dynamodb-items-rest
    port: 8080
    description: REST adapter for Amazon DynamoDB API — Items. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/deleteitem
      name: deleteitem
      description: 'REST surface for #DeleteItem.'
      operations:
      - method: POST
        name: deleteitem
        description: Amazon Dynamodb Delete an Item
        call: dynamodb-items.deleteitem
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/getitem
      name: getitem
      description: 'REST surface for #GetItem.'
      operations:
      - method: POST
        name: getitem
        description: Amazon Dynamodb Get an Item by Primary Key
        call: dynamodb-items.getitem
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/putitem
      name: putitem
      description: 'REST surface for #PutItem.'
      operations:
      - method: POST
        name: putitem
        description: Amazon Dynamodb Create or Replace an Item
        call: dynamodb-items.putitem
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/updateitem
      name: updateitem
      description: 'REST surface for #UpdateItem.'
      operations:
      - method: POST
        name: updateitem
        description: Amazon Dynamodb Update an Item
        call: dynamodb-items.updateitem
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dynamodb-items-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon DynamoDB API — Items. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-dynamodb-delete-item
      description: Amazon Dynamodb Delete an Item
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dynamodb-items.deleteitem
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-dynamodb-get-item-primary
      description: Amazon Dynamodb Get an Item by Primary Key
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: dynamodb-items.getitem
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-dynamodb-create-replace-item
      description: Amazon Dynamodb Create or Replace an Item
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dynamodb-items.putitem
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-dynamodb-update-item
      description: Amazon Dynamodb Update an Item
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dynamodb-items.updateitem
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
