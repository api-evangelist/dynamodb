specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Amazon DynamoDB
providerId: dynamodb
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - AWS
  - Database
  - NoSQL
description: 'FOCUS-aligned FinOps for Amazon DynamoDB: pay-per-request and provisioned-capacity billing
  with optional Reserved Capacity commitments, per AWS Region.'
sources:
  - https://aws.amazon.com/dynamodb/pricing/
  - https://docs.aws.amazon.com/cur/latest/userguide/what-is-cur.html
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Amazon Web Services, Inc.
serviceCategory: Database
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Amazon DynamoDB
  ServiceCategory: Database
  ProviderName: Amazon Web Services
  PublisherName: Amazon Web Services, Inc.
  InvoiceIssuerName: Amazon Web Services, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingUnit: request-unit / capacity-unit-hour / GB-month
meters:
  - name: read_request_units
    unit: request
    aggregation: sum
    dimensions:
      - region
      - table
      - consistency
  - name: write_request_units
    unit: request
    aggregation: sum
    dimensions:
      - region
      - table
      - transaction
  - name: provisioned_read_capacity
    unit: RCU-hour
    aggregation: sum
    dimensions:
      - region
      - table
  - name: provisioned_write_capacity
    unit: WCU-hour
    aggregation: sum
    dimensions:
      - region
      - table
  - name: storage_gb_month
    unit: GB-month
    aggregation: avg
    dimensions:
      - region
      - table
      - storage_class
  - name: streams_reads
    unit: request
    aggregation: sum
    dimensions:
      - region
      - table
  - name: backup_storage
    unit: GB-month
    aggregation: avg
    dimensions:
      - region
      - backup_type
  - name: data_transfer_out
    unit: GB
    aggregation: sum
    dimensions:
      - region
      - destination
principles:
  - name: Visibility
    description: Use AWS Cost Explorer, the Cost and Usage Report (CUR), and CloudWatch DynamoDB metrics
      (ConsumedReadCapacityUnits, ConsumedWriteCapacityUnits, ThrottledRequests) to track consumption
      per table and region.
  - name: Allocation
    description: Tag tables with cost-allocation tags (team, environment, application) and enable user-defined
      cost allocation in the AWS Billing console for chargeback.
  - name: Optimization
    description: Switch idle workloads to On-Demand, apply Reserved Capacity for steady provisioned RCU/WCU,
      use DynamoDB Standard-IA storage class for cold tables, enable auto-scaling, and adopt DAX caching
      to lower read costs.
  - name: Accountability
    description: Set CloudWatch billing alarms and AWS Budgets per tag dimension; review per-table costs
      monthly against the CUR and investigate ThrottledRequests spikes.
maintainers:
