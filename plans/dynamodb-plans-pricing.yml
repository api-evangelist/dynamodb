specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Amazon DynamoDB
providerId: dynamodb
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - AWS
  - Cloud
  - Database
  - NoSQL
  - Serverless
description: Amazon DynamoDB is a fully managed NoSQL database with two capacity modes (On-Demand and
  Provisioned). Pricing is usage-based per read/write request unit, plus storage, backup, restore, streams,
  DAX cache nodes, and cross-region data transfer. AWS Free Tier and Reserved Capacity are available.
sources:
  - https://aws.amazon.com/dynamodb/pricing/
  - https://aws.amazon.com/dynamodb/pricing/on-demand/
  - https://aws.amazon.com/dynamodb/pricing/provisioned/
plans:
  - id: dynamodb-free-tier
    name: AWS Free Tier
    type: freemium
    description: AWS Free Tier monthly allowance for DynamoDB. Always-free for the first 25 GB and 25
      WCU/RCU of provisioned capacity.
    entries:
      - label: Storage included
        name: free_storage
        type: quota
        metric: gb
        limit: 25
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Provisioned read capacity
        name: free_rcu
        type: quota
        metric: rcu
        limit: 25
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Provisioned write capacity
        name: free_wcu
        type: quota
        metric: wcu
        limit: 25
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: DynamoDB Streams reads
        name: free_streams_reads
        type: quota
        metric: requests
        limit: 2500000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 25 GB storage
      - name: 25 RCU + 25 WCU provisioned
      - name: 2.5M Streams read requests
      - name: 1 GB data transfer out (15 GB first 12 months)
  - id: dynamodb-on-demand
    name: On-Demand Capacity
    type: usage-based
    description: Pay-per-request pricing with no capacity planning. Prices shown are us-east-1 reference
      pricing; vary by region.
    entries:
      - label: Read request units (eventually consistent)
        name: rru_eventual
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000000
        price: '0.125'
        userMultiplied: false
      - label: Write request units (standard)
        name: wru_standard
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000000
        price: '0.625'
        userMultiplied: false
      - label: Transactional reads
        name: rru_transactional
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000000
        price: '0.125'
        userMultiplied: false
      - label: Transactional writes
        name: wru_transactional
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000000
        price: '0.625'
        userMultiplied: false
      - label: Standard storage
        name: storage_standard
        type: metered
        metric: gb
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.25'
        userMultiplied: false
      - label: Standard-IA storage
        name: storage_ia
        type: metered
        metric: gb
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.10'
        userMultiplied: false
    elements:
      - name: No capacity planning
      - name: Auto-scales to traffic
      - name: 40,000 RRU/WRU per table default
  - id: dynamodb-provisioned
    name: Provisioned Capacity
    type: usage-based
    description: Pre-provisioned read/write capacity, billed hourly. Reserved Capacity (1y/3y) discounts
      available for steady workloads.
    entries:
      - label: Read capacity unit (RCU)
        name: rcu_hour
        type: metered
        metric: rcu
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.00013'
        userMultiplied: false
      - label: Write capacity unit (WCU)
        name: wcu_hour
        type: metered
        metric: wcu
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.00065'
        userMultiplied: false
      - label: Standard storage
        name: storage_standard
        type: metered
        metric: gb
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.25'
        userMultiplied: false
    elements:
      - name: Predictable cost for steady traffic
      - name: Reserved Capacity discount eligible
      - name: 40,000 RCU/WCU per table default
  - id: dynamodb-backup-restore
    name: Backup and Restore
    type: usage-based
    description: On-demand backups, point-in-time recovery, and table restore are billed by GB processed.
    entries:
      - label: On-demand backup storage
        name: backup_ondemand
        type: metered
        metric: gb
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.10'
        userMultiplied: false
      - label: Point-in-time recovery (PITR)
        name: backup_pitr
        type: metered
        metric: gb
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.20'
        userMultiplied: false
      - label: Table restore
        name: backup_restore
        type: metered
        metric: gb
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.15'
        userMultiplied: false
    elements:
      - name: On-demand backup
      - name: PITR continuous backup
      - name: AWS Backup integration
maintainers:
  - name: Amazon Web Services
    email: aws-dynamodb@amazon.com
    url: https://aws.amazon.com
  - name: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
